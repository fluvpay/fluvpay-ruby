name: CI Ruby SDK

on:
  push:
    paths:
      - "sdks/ruby/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "sdks/ruby/**"

defaults:
  run:
    working-directory: sdks/ruby

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ["3.0", "3.1", "3.2", "3.3"]
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdks/ruby

      - name: Rodar testes unit e de webhook (sem rede)
        env:
          FLUVPAY_TEST_KEY: ${{ secrets.FLUVPAY_TEST_KEY }}
        run: bundle exec rake test
